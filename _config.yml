title: DigitalBlake
email: blake@digitalblake.com
description: >-
    I've developed in multiple content management systems from the ever popular
    WordPress to the developer friendly and powerful Drupal.
baseurl: ""
url: "https://digitalblake.com"
twitter_username: BlakeCerecero
github_username: Blake-C
author:
    id: digitalblake
    name: Blake Cerecero
    twitter: BlakeCerecero

permalink: /:year/:month/:day/:title/

# Build settings
sass:
    style: compressed

plugins:
    - jekyll-feed
    - jekyll-seo-tag
    - jekyll-archives
    - jekyll-paginate-v2

# Pagination (jekyll-paginate-v2)
pagination:
    enabled: true
    per_page: 10
    permalink: "/page/:num/"
    title: ":title - page :num"
    limit: 0
    sort_field: "date"
    sort_reverse: true

# Jekyll Archives configuration
jekyll-archives:
    enabled:
        - categories
        - tags
    layouts:
        category: archive
        tag: archive
    permalinks:
        category: "/category/:name/"
        tag: "/tag/:name/"

# Navigation items (shown in header nav)
nav_pages:
    - title: Projects
      url: "/#projects"
    - title: Articles
      url: "/articles/"
    - title: "Résumé"
      url: "/assets/uploads/2024/07/Blake-Cerecero-Web-Resume-v3.pdf"
      target: "_blank"

collections:
    github_projects:
        output: false
    websites:
        output: false

# Exclude from processing
exclude:
    - .sass-cache/
    - .jekyll-cache/
    - Gemfile
    - Gemfile.lock
    - node_modules/
    - vendor/
