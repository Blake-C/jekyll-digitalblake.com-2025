title: DigitalBlake
email: blake@digitalblake.com
description: >-
    I've developed in multiple content management systems from the ever popular
    WordPress to the developer friendly and powerful Drupal.
baseurl: '/jekyll-digitalblake.com-2025'
url: 'https://blake-c.github.io'
twitter_username: BlakeCerecero
github_username: Blake-C
author:
    id: digitalblake
    twitter: BlakeCerecero

permalink: /:year/:month/:day/:title/

# Build settings
highlighter: none
markdown: kramdown
kramdown:
    input: GFM
    syntax_highlighter_opts:
        disable: true

sass:
    style: compressed

plugins:
    - jekyll-feed
    - jekyll-paginate-v2

# Pagination (jekyll-paginate-v2)
pagination:
    enabled: true
    per_page: 10
    permalink: '/page/:num/'
    title: ':title - page :num'
    limit: 0
    sort_field: 'date'
    sort_reverse: true

# AutoPages — paginated category and tag archive pages
autopages:
    enabled: true
    categories:
        enabled: true
        layouts:
            - 'archive.html'
        title: ':cat'
        permalink: '/category/:cat'
        slugify:
            mode: 'default'
            cased: false
    tags:
        enabled: true
        layouts:
            - 'archive.html'
        title: ':tag'
        permalink: '/tag/:tag'
        slugify:
            mode: 'default'
            cased: false
    collections:
        enabled: false

# Navigation items (shown in header nav)
nav_pages:
    - title: Projects
      url: '/#projects'
    - title: Articles
      url: '/articles/'
    - title: 'Résumé'
      url: '/assets/uploads/2024/07/Blake-Cerecero-Web-Resume-v3.pdf'
      target: '_blank'

collections:
    github_projects:
        output: false
    websites:
        output: false

# Exclude from processing
exclude:
    - .sass-cache/
    - .jekyll-cache/
    - Gemfile
    - Gemfile.lock
    - node_modules/
    - vendor/
