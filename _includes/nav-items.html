<ul id="menu-main-menu" class="main-menu">
	{%- for nav in site.nav_pages -%}
		<li class="menu-item">
			<a
				href="{{ nav.url | relative_url }}"
				{% if nav.target %}
					target="{{ nav.target }}" rel="noopener"
				{% endif %}
			>
				{{- nav.title -}}
			</a>
		</li>
	{%- endfor -%}
</ul>
