<section class="github" id="projects">
	<h2 class="github__title">Projects</h2>

	<div class="row small-up-1 medium-up-2 large-up-3">
		{%- for project in site.github_projects -%}
			<div class="large-4 medium-6 small-12 columns">
				<div class="git-project">
					<h3 class="git-project__title">{{ project.title }}</h3>

					<p>
						{{ project.description }}
					</p>

					<p>
						<strong>Language<br></strong>{{ project.language }}
					</p>

					<a
						class="git-project__link"
						aria-label="View {{ project.title }}"
						href="{{ project.link }}"
						target="_blank"
						rel="noreferrer noopener"
						>View Project</a
					>
				</div>
			</div>
		{%- endfor -%}
	</div>
</section>
