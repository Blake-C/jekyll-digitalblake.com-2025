<!doctype html>
<html lang="{{ page.lang | default: site.lang | default: 'en-US' }}">
	{%- include head.html -%}

	<body
		{% if page.body_class %}
			class="{{ page.body_class }}"
		{% endif %}
	>
		<a class="skip-link show-for-sr" href="#content">Skip to content</a>

		{%- include header.html -%}

		{{ content }}

		{%- include footer.html -%}

		{%- include sub-footer.html -%}
	</body>
</html>
